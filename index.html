<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kencana Variasi Plat</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f1f3f6;
}

/* HEADER */
header {
  background: #00aa5b;
  padding: 15px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: white;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.search {
  width: 40%;
}

.search input {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

.cart {
  font-size: 18px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 20px;
}

/* GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  transition: 0.25s;
  cursor: pointer;
  border: 1px solid #eee;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
}

/* BODY */
.card-body {
  padding: 12px;
}

.title {
  font-size: 14px;
  height: 38px;
  overflow: hidden;
  margin-bottom: 5px;
}

.price {
  color: #ee4d2d;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 8px;
}

/* BADGE */
.badge {
  display: inline-block;
  background: #ff5722;
  color: white;
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 5px;
  margin-bottom: 5px;
}

/* BUTTON */
.btn {
  display: block;
  text-align: center;
  padding: 8px;
  background: #00aa5b;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
  transition: 0.2s;
}

.btn:hover {
  background: #008f4c;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #888;
  font-size: 13px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Plat Kencana Motor</div>
</header>

<div class="container">
  <div class="products">

    <!-- Produk 1 -->
    <div class="card">
      <img src="images/hologramnontimbul.png">
      <div class="card-body">
        <div class="badge">Terlaris</div>
        <div class="title">Plat Motor Hologram Non Timbul</div>
        <div class="price">Rp 120.000</div>
        <a href="checkout.html?produk=Plat Hologram Non Timbul&harga=120.000" class="btn">Beli</a>
      </div>
    </div>

    <!-- Produk 2 -->
    <div class="card">
      <img src="images/hologramtimbul.jpeg">
      <div class="card-body">
        <div class="badge">Promo</div>
        <div class="title">Plat Motor Hologram Timbul</div>
        <div class="price">Rp 130.000</div>
        <a href="checkout.html?produk=Hologram Timbul&harga=130.000" class="btn">Beli</a>
      </div>
    </div>

    <!-- Produk 3 -->
    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <div class="card-body">
        <div class="badge">Baru</div>
        <div class="title">Plat Motor Timbul</div>
        <div class="price">Rp 120.000</div>
        <a href="checkout.html?produk=Plat Timbul&harga=120.000" class="btn">Beli</a>
      </div>
    </div>

  </div>
</div>

<footer>
  © 2026 PlatNomor Store
</footer>

</body>
</html>
